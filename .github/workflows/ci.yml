name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: lint • typecheck • test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projeto
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projeto/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 9 lint errors at the time CI was introduced (mostly react/display-name
      # on memoized components). Allow-fail until those are cleaned up so the
      # signal we actually care about — new regressions — is still visible.
      - name: Lint
        run: pnpm lint
        continue-on-error: true

      # 9 strict-mode errors at the time CI was introduced (AppDataContext
      # shape mismatches and PsychologistProfile schema). Allow-fail until
      # the domain decisions are made; the step still surfaces new failures.
      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Test
        run: pnpm test -- --ci
