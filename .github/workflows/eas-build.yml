name: EAS Build & Submit

# Builds consume EAS credits and Apple/Google quota, so this never runs on
# every push. Two opt-in entrypoints exist:
#   1. workflow_dispatch — manual run with explicit profile/platform/submit choices.
#   2. push of a tag matching 'build-ios-*' — shortcut for production iOS + submit=true
#      (the only combo used to cut a TestFlight train). Deliberate by design: tags
#      are intentional artifacts, so accidental builds remain unlikely.
# The CI workflow (ci.yml) keeps handling lint/typecheck/test on every push.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        type: choice
        default: preview
        options: [development, preview, production]
      platform:
        description: 'Target platform'
        required: true
        type: choice
        default: all
        options: [ios, android, all]
      submit:
        description: 'Submit to the store after the build completes (production profile only)'
        required: true
        type: boolean
        default: false
  push:
    tags:
      - 'build-ios-*'

jobs:
  build:
    name: eas build (${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }} ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'ios' }})
    runs-on: ubuntu-latest
    env:
      # Tag pushes always target production iOS + submit=true (TestFlight train).
      # workflow_dispatch keeps the explicit choices from inputs.
      EAS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}
      EAS_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'ios' }}
      EAS_SUBMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.submit || 'true' }}
    defaults:
      run:
        working-directory: projeto
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          package_json_file: projeto/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projeto/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        # Pinned globally so the lockfile doesn't need a devDependency for it.
        run: npm install -g eas-cli

      - name: Verify EAS authentication
        # EXPO_TOKEN must be set as a repository secret; without it eas-cli
        # cannot upload the tarball.
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN repo secret is not set; create one in Settings → Secrets → Actions." >&2
            exit 1
          fi
          eas whoami

      # Pre-flight: same gates ci.yml runs. Catches a broken bundle before
      # we spend EAS credits on it.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # EAS Build pulls these from the project's EAS secrets at build
          # time too; passing them here just lets the CLI surface clearer
          # errors locally if any are missing.
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: eas build --non-interactive --no-wait --profile "$EAS_PROFILE" --platform "$EAS_PLATFORM"

      # Submit is opt-in and only for production. The EAS dashboard still
      # shows the build URL even when submit is skipped.
      - name: EAS submit
        if: ${{ env.EAS_SUBMIT == 'true' && env.EAS_PROFILE == 'production' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: eas submit --non-interactive --profile production --platform "$EAS_PLATFORM" --latest
